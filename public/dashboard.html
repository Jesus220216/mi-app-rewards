<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050807;
  color:white;
}

.header {
  text-align:center;
  padding:30px 20px;
}

.header span { color:#00ff88; }

.top-cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  padding:20px;
}

.top-card {
  background:#0b1a12;
  border:1px solid #00ff88;
  border-radius:15px;
  padding:20px;
  width:220px;
  text-align:center;
  cursor:pointer;
}

.apps {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:15px;
}

.app {
  min-width:70px;
  background:#111;
  border-radius:10px;
  padding:10px;
}

.app img { width:30px; }

.big-card {
  margin:20px;
  background:#0b1a12;
  border:1px solid #00ff88;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.big-card img {
  width:120px;
  border-radius:10px;
}

.btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ff88;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>Ingresos adicionales fáciles</h1>
  <span>Gana hasta $50 al día</span>
</div>

<!-- TOP -->
<div class="top-cards">
  <div class="top-card" onclick="abrirJuego('ruleta')">
    <h3>🎮 Juegos</h3>
    <p>$0.50 - $120</p>
  </div>

  <div class="top-card" onclick="abrirEncuestas()">
    <h3>📊 Encuestas</h3>
    <p>$0.50 - $6</p>
  </div>

  <div class="top-card" onclick="abrirEncuestas()">
    <h3>🔥 Ofertas</h3>
    <p>$1 - $75</p>
  </div>
</div>

<!-- SALDO -->
<div style="text-align:center;">
  <h2 id="saldo">$0.00</h2>
  <p>Hoy: <span id="today">$0.00</span></p>
  <p>🎮 Nivel: <span id="level">1</span></p>
</div>

<!-- REFERIDOS -->
<div style="text-align:center; margin-top:20px;">
  <p>Tu link:</p>
  <input id="refLink" style="width:90%; padding:10px;" readonly>
  <br><br>
  <button class="btn" onclick="copiarRef()">📋 Copiar</button>
</div>

<!-- MISION -->
<div style="text-align:center; margin-top:20px;">
  <button class="btn" onclick="hacerMision()">🎯 Completar misión (+$0.25)</button>
</div>

<!-- LEADERBOARD -->
<div style="text-align:center; margin-top:20px;">
  <h3>🏆 Top usuarios</h3>
  <div id="leaderboard"></div>
</div>

<!-- BOTONES -->
<div style="text-align:center; margin:30px;">
  <button class="btn" onclick="retirar()">💳 Retirar</button>
  <button class="btn" onclick="logout()">🚪 Salir</button>
</div>

<!-- CPX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
const CPX_APP_ID = "32070";
const CPX_API_KEY = "Rg9JpjEO4PNU1CYZRx6owtZkypREstSS";

function getUserId() {
  let id = localStorage.getItem("cpx_user_id");
  if (!id) {
    id = "srv-" + Math.random().toString(36).substring(2, 15);
    localStorage.setItem("cpx_user_id", id);
  }
  return id;
}

function abrirEncuestas() {
  const user_id = getUserId();
  const hash = CryptoJS.MD5(user_id + CPX_API_KEY).toString();

  const url = `https://offers.cpx-research.com/index.php?app_id=${CPX_APP_ID}&ext_user_id=${user_id}&secure_hash=${hash}`;

  document.body.innerHTML = `
    <button onclick="location.reload()">⬅ Volver</button>
    <iframe src="${url}" style="width:100%;height:100vh;border:none;"></iframe>
  `;
}

// REFERIDOS
const myId = getUserId();
document.getElementById("refLink").value = `${window.location.origin}?ref=${myId}`;

function copiarRef(){
  navigator.clipboard.writeText(refLink.value);
  alert("Copiado 🚀");
}

// RETIRO
function retirar(){
  fetch("/withdraw", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ user_id: getUserId() })
  })
  .then(res=>res.text())
  .then(msg=>alert(msg));
}

// MISION
function hacerMision(){
  fetch("/mission", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ user_id: getUserId() })
  })
  .then(res=>res.text())
  .then(msg=>alert(msg));
}

function abrirJuego(nombre){
  window.location.href = "game-" + nombre + ".html";
}

// LEADERBOARD
fetch("/leaderboard")
.then(res => res.json())
.then(data => {
  const box = document.getElementById("leaderboard");
  box.innerHTML = data.map((u,i)=>`
    <p>#${i+1} - $${(u.earnings||0).toFixed(2)}</p>
  `).join("");
});
</script>

<!-- FIREBASE REALTIME -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1w_66STxqf5iMVneB8DgLnpFwS8RGy3g",
  authDomain: "rutarizador-v12.firebaseapp.com",
  projectId: "rutarizador-v12"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userId = localStorage.getItem("cpx_user_id");
const userRef = doc(db, "users", userId);

// REALTIME
onSnapshot(userRef, (docSnap) => {
  if (docSnap.exists()) {
    const data = docSnap.data();
    saldo.innerText = "$" + (data.earnings||0).toFixed(2);
    today.innerText = "$" + (data.today||0).toFixed(2);
    level.innerText = data.level || 1;
  }
});

// BONUS DIARIO
const todayKey = new Date().toDateString();
if(localStorage.getItem("daily_bonus") !== todayKey){
  await updateDoc(userRef,{
    earnings: increment(0.50),
    today: increment(0.50)
  });
  localStorage.setItem("daily_bonus", todayKey);
  alert("🎁 Bono diario");
}
</script>

<script>
function logout(){
  localStorage.removeItem("cpx_user_id");
  alert("Sesión cerrada");
  location.href="index.html";
}
</script>

</body>
</html>
