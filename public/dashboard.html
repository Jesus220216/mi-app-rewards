<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050807;
  color:white;
}

.header { text-align:center; padding:30px 20px; }
.header span { color:#00ff88; }

.top-cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  padding:20px;
}

.top-card {
  background:#0b1a12;
  border:1px solid #00ff88;
  border-radius:15px;
  padding:20px;
  width:220px;
  text-align:center;
  cursor:pointer;
}

.apps {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:15px;
}

.app {
  min-width:70px;
  background:#111;
  border-radius:10px;
  padding:10px;
}

.app img { width:30px; }

.section { text-align:center; margin-top:30px; }

.big-card {
  margin:20px;
  background:#0b1a12;
  border:1px solid #00ff88;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.big-card img { width:120px; border-radius:10px; }

.btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ff88;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>Ingresos adicionales fáciles</h1>
  <span>Nivel: <span id="nivel">1</span> 🚀</span>
</div>

<!-- CARDS -->
<div class="top-cards">
  <div class="top-card" onclick="abrirJuego('ruleta')">
    <h3>Jugar juegos</h3>
  </div>

  <div class="top-card" onclick="abrirEncuestas()">
    <h3>Encuestas</h3>
  </div>

  <div class="top-card" onclick="abrirEncuestas()">
    <h3>Ofertas</h3>
  </div>
</div>

<!-- SALDO -->
<div style="text-align:center;">
  <h2 id="saldo">$0.00</h2>
  <p>Hoy: <span id="today">$0.00</span></p>
</div>

<!-- REFERIDOS -->
<div style="text-align:center;">
  <input id="refLink" style="width:90%; padding:10px;" readonly>
  <button class="btn" onclick="copiarRef()">Copiar</button>
</div>

<!-- LEADERBOARD -->
<div style="text-align:center; margin-top:20px;">
  <h3>🏆 Ranking</h3>
  <ul id="ranking"></ul>
</div>

<!-- MISIONES -->
<div style="text-align:center; margin-top:20px;">
  <h3>🎯 Misiones</h3>
  <button class="btn" onclick="mision()">Completar misión (+$0.20)</button>
</div>

<!-- BOTONES -->
<div style="text-align:center; margin:20px;">
  <button class="btn" onclick="retirar()">💳 Retirar</button>
  <button class="btn" onclick="logout()">🚪 Salir</button>
</div>

<!-- CPX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
const CPX_APP_ID = "32070";
const CPX_API_KEY = "Rg9JpjEO4PNU1CYZRx6owtZkypREstSS";

/* 🔥 CONEXIÓN REAL (MISMO ID PARA TODO) */
function getUserId() {
  let id = localStorage.getItem("user_id");

  if (!id) {
    id = "user-" + Math.random().toString(36).substring(2, 12);
    localStorage.setItem("user_id", id);
  }

  return id;
}

/* 🔥 ABRIR ENCUESTAS (ARREGLADO) */
function abrirEncuestas() {
  const user_id = getUserId();
  const hash = CryptoJS.MD5(user_id + CPX_API_KEY).toString();

  const url = `https://offers.cpx-research.com/index.php?app_id=${CPX_APP_ID}&ext_user_id=${user_id}&secure_hash=${hash}`;

  document.body.innerHTML = `
    <button onclick="location.reload()">⬅ Volver</button>
    <iframe src="${url}" style="width:100%;height:100vh;border:none;"></iframe>
  `;
}

/* 🎯 REFERIDO */
const myId = getUserId();

window.onload = () => {
  document.getElementById("refLink").value = `${window.location.origin}?ref=${myId}`;
};

function copiarRef(){
  navigator.clipboard.writeText(document.getElementById("refLink").value);
  alert("Copiado 🚀");
}

// RETIRO
function retirar(){
  fetch("/withdraw", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ user_id: getUserId() })
  })
  .then(()=> alert("Solicitud enviada"));
}

function abrirJuego(nombre){
  location.href = "game-" + nombre + ".html";
}
</script>

<!-- FIREBASE PRO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, onSnapshot, updateDoc,
  increment, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyD1w_66STxqf5iMVneB8DgLnpFwS8RGy3g",
  authDomain: "rutarizador-v12.firebaseapp.com",
  projectId: "rutarizador-v12"
});

const db = getFirestore(app);
const userId = localStorage.getItem("cpx_user_id");
const ref = doc(db, "users", userId);

// REALTIME
onSnapshot(ref, (docSnap) => {
  if (!docSnap.exists()) return;

  const d = docSnap.data();

  document.getElementById("saldo").innerText = "$" + (d.earnings || 0).toFixed(2);
  document.getElementById("today").innerText = "$" + (d.today || 0).toFixed(2);

  // NIVEL
  const nivel = Math.floor((d.earnings || 0) / 10) + 1;
  document.getElementById("nivel").innerText = nivel;
});

// MISION
import { setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

await setDoc(userRef, {
  earnings: increment(0.50),
  today: increment(0.50)
}, { merge: true });

// LEADERBOARD
const snap = await getDocs(collection(db, "users"));
let list = "";

snap.forEach(u => {
  const data = u.data();
  list += `<li>$${(data.earnings||0).toFixed(2)}</li>`;
});

document.getElementById("ranking").innerHTML = list;

// ANTI FRAUDE
let clicks = 0;
document.body.addEventListener("click", () => {
  clicks++;
  if (clicks > 100) {
    alert("⚠️ Actividad sospechosa");
  }
});
</script>

<!-- LOGOUT -->
<script type="module">
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const auth = getAuth();

window.logout = async () => {
  await signOut(auth);
  localStorage.removeItem("cpx_user_id");
  location.href = "index.html";
};

</script>

</html>
