<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050807;
  color:white;
}

.header {
  text-align:center;
  padding:30px 20px;
}

.header span { color:#00ff88; }

.top-cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  padding:20px;
}

.top-card {
  background:#0b1a12;
  border:1px solid #00ff88;
  border-radius:15px;
  padding:20px;
  width:220px;
  text-align:center;
  cursor:pointer;
}

.apps {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:15px;
}

.app {
  min-width:70px;
  background:#111;
  border-radius:10px;
  padding:10px;
}

.app img { width:30px; }

.section {
  text-align:center;
  margin-top:30px;
}

.big-card {
  margin:20px;
  background:#0b1a12;
  border:1px solid #00ff88;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.big-card img {
  width:120px;
  border-radius:10px;
}

.btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ff88;
  cursor:pointer;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
  <h1>Ingresos adicionales fáciles</h1>
  <span>Gana hasta $50 al día</span>
</div>

<!-- CARDS -->
<div class="top-cards">

  <div class="top-card" onclick="abrirJuego('ruleta')">
    <h3>Jugar juegos</h3>
    <p>$0.50 - $120</p>
  </div>

  <div class="top-card" onclick="abrirEncuestas()">
    <h3>Encuestas</h3>
    <p>$0.50 - $6</p>
  </div>

  <div class="top-card" onclick="abrirEncuestas()">
    <h3>Ofertas</h3>
    <p>$1 - $75</p>
  </div>

</div>

<!-- APPS -->
<div class="apps">
  <div class="app"><img src="https://img.icons8.com/color/48/netflix.png"></div>
  <div class="app"><img src="https://img.icons8.com/color/48/paypal.png"></div>
  <div class="app"><img src="https://img.icons8.com/color/48/amazon.png"></div>
</div>

<div class="section">
  <h2>Más recompensas</h2>
</div>

<!-- TARJETAS -->
<div class="big-card">
  <div>
    <h3>Gana dinero jugando</h3>
    <button class="btn" onclick="abrirJuego('ruleta')">Ir</button>
  </div>
  <img src="https://i.imgur.com/2DhmtJ4.png">
</div>

<div class="big-card">
  <div>
    <h3>Completa encuestas</h3>
    <button class="btn" onclick="abrirEncuestas()">Ir</button>
  </div>
  <img src="https://i.imgur.com/2DhmtJ4.png">
</div>

<!-- 💰 SALDO -->
<div style="text-align:center; margin-top:20px;">
  <h2 id="saldo">$0.00</h2>
  <p>Hoy: <span id="today">$0.00</span></p>
</div>

<!-- 🎯 REFERIDOS -->
<div style="text-align:center; margin-top:20px;">
  <p>Tu link de referido:</p>
  <input id="refLink" style="width:90%; padding:10px; border-radius:8px;" readonly>
  <br><br>
  <button class="btn" onclick="copiarRef()">📋 Copiar</button>
</div>

<!-- 📊 STATS -->
<div style="text-align:center; margin-top:20px;">
  <h3>Estadísticas</h3>
  <p>Total: <span id="total">$0</span></p>
  <p>Hoy: <span id="today2">$0</span></p>
</div>

<!-- BOTONES -->
<div style="text-align:center; margin:30px;">
  <button class="btn" onclick="retirar()">💳 Retirar</button>
  <button class="btn" onclick="logout()">🚪 Salir</button>
</div>

<!-- 🔐 CPX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<script>
const CPX_APP_ID = "32070";
const CPX_API_KEY = "Rg9JpjEO4PNU1CYZRx6owtZkypREstSS";

function getUserId() {
    let id = localStorage.getItem("cpx_user_id");
    if (!id) {
        id = "srv-" + Math.random().toString(36).substring(2, 15);
        localStorage.setItem("cpx_user_id", id);
    }
    return id;
}

function abrirEncuestas() {
    const user_id = getUserId();
    const hash = CryptoJS.MD5(user_id + CPX_API_KEY).toString();

    const url = `https://offers.cpx-research.com/index.php?app_id=${CPX_APP_ID}&ext_user_id=${user_id}&secure_hash=${hash}`;

    document.body.innerHTML = `
        <button onclick="location.reload()">⬅ Volver</button>
        <iframe src="${url}" style="width:100%;height:100vh;border:none;"></iframe>
    `;
}

// REFERIDOS
const myId = getUserId();
const refLink = `${window.location.origin}?ref=${myId}`;
document.getElementById("refLink").value = refLink;

function copiarRef(){
  navigator.clipboard.writeText(refLink);
  alert("Copiado 🚀");
}

// RETIRO
function retirar(){
  fetch("/withdraw", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ user_id: getUserId() })
  })
  .then(res=>res.text())
  .then(()=> alert("Solicitud enviada 💰"));
}

function abrirJuego(nombre){
  window.location.href = "game-" + nombre + ".html";
}
</script>

<!-- 🔥 FIREBASE REALTIME -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD1w_66STxqf5iMVneB8DgLnpFwS8RGy3g",
    authDomain: "rutarizador-v12.firebaseapp.com",
    projectId: "rutarizador-v12"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userId = localStorage.getItem("cpx_user_id");
const userRef = doc(db, "users", userId);

onSnapshot(userRef, (docSnap) => {
  if (docSnap.exists()) {
    const data = docSnap.data();

    document.getElementById("saldo").innerText = "$" + (data.earnings || 0).toFixed(2);
    document.getElementById("today").innerText = "$" + (data.today || 0).toFixed(2);
    document.getElementById("total").innerText = "$" + (data.earnings || 0);
    document.getElementById("today2").innerText = "$" + (data.today || 0);
  }
});
</script>

<!-- 🚪 LOGOUT -->
<script type="module">
import { auth } from "./firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

window.logout = async function() {
  try {
    await signOut(auth);
    localStorage.removeItem("cpx_user_id");
    alert("Sesión cerrada 👋");
    window.location.href = "index.html";
  } catch (error) {
    alert("Error al cerrar sesión");
    console.error(error);
  }
};
</script>

</body>
</html>
