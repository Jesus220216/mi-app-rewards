<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutartizador</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f1f, #050814);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card {
    width: 340px;
    padding: 30px;
    border-radius: 18px;
    background: #0f172a;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
    text-align: center;
}

.icon {
    font-size: 28px;
    margin-bottom: 10px;
}

h1 {
    color: #00e5ff;
}

label {
    display:block;
    text-align:left;
    margin-top:10px;
    font-size:12px;
    color:#ffd54f;
}

input {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #00e5ff40;
    background:#020617;
    color:white;
}

.password-box {
    position: relative;
}

.toggle {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:12px;
    color:#00e5ff;
}

.btn {
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#facc15;
    cursor:pointer;
}

.copy-btn {
    margin-top:5px;
    font-size:12px;
    cursor:pointer;
    color:#00e5ff;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚡</div>
    <h1>RUTARTIZADOR</h1>

    <label>Email</label>
    <input id="loginEmail" type="email">

    <label>Contraseña</label>
    <div class="password-box">
        <input id="loginPassword" type="password">
        <span class="toggle" onclick="togglePass()">VER</span>
    </div>

    <label>Código referido</label>
    <input id="referralCode">

    <div class="copy-btn" onclick="pasteRef()">📋 Pegar referido</div>

    <button onclick="login()" class="btn">Entrar</button>
    <button onclick="register()" class="btn">Registrarse</button>

    <button onclick="bonus()" class="btn">🎁 Bonus diario</button>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyD1w_66STxqf5iMVneB8DgLnpFwS8RGy3g",
  authDomain: "rutarizador-v12.firebaseapp.com",
  projectId: "rutarizador-v12"
});

window.auth = getAuth(app);
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
</script>

<!-- 🔥 FUNCIONES -->
<script>

// 👁 VER PASSWORD
function togglePass(){
  const input = document.getElementById("loginPassword");
  input.type = input.type === "password" ? "text" : "password";
}

// 📋 PEGAR REFERIDO
function pasteRef(){
  const ref = localStorage.getItem("referrer_id");
  if(ref){
    document.getElementById("referralCode").value = ref;
    alert("Referido aplicado ✅");
  } else {
    alert("No hay referido");
  }
}

// 🎯 GUARDAR REFERIDO DE URL
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");

  if(ref){
    localStorage.setItem("referrer_id", ref);
    document.getElementById("referralCode").value = ref;
  }
});

// 🔐 LOGIN
window.login = async function(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  if (!email || !password){
    alert("Completa los campos");
    return;
  }

  try{
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "dashboard.html";
  }catch(e){
    alert(e.message);
  }
};

// 🆕 REGISTRO
window.register = async function(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  const ref = document.getElementById("referralCode").value;

  if (!email || !password){
    alert("Completa los campos");
    return;
  }

  try{
    await createUserWithEmailAndPassword(auth, email, password);

    if(ref){
      localStorage.setItem("referrer_id", ref);
    }

    alert("Cuenta creada 🚀");
  }catch(e){
    alert(e.message);
  }
};

// 🎁 BONUS (visual)
function bonus(){
  alert("🎁 Bonus activado");
}

</script>

</body>
</html>
