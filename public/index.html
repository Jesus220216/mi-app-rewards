<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutartizador</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0f1f, #050814);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
}

.card {
    width: 340px;
    padding: 30px;
    border-radius: 18px;
    background: #0f172a;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
    text-align: center;
}

.icon {
    font-size: 28px;
    margin-bottom: 10px;
}

h1 {
    color: #00e5ff;
}

label {
    display:block;
    text-align:left;
    margin-top:10px;
    font-size:12px;
    color:#ffd54f;
}

input {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #00e5ff40;
    background:#020617;
    color:white;
}

.password-box {
    position: relative;
}

.toggle {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:12px;
    color:#00e5ff;
}

.btn {
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#facc15;
    cursor:pointer;
}

.copy-btn {
    margin-top:5px;
    font-size:12px;
    cursor:pointer;
    color:#00e5ff;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚡</div>
    <h1>RUTARTIZADOR</h1>

    <label>Email</label>
    <input id="loginEmail" type="email">

    <label>Contraseña</label>
    <div class="password-box">
        <input id="loginPassword" type="password">
        <span class="toggle" onclick="togglePass()">VER</span>
    </div>

    <label>Código referido</label>
    <input id="referralCode">

    <div class="copy-btn" onclick="pasteRef()">📋 Pegar referido</div>

<button id="btnLogin" class="btn">Entrar</button>
<button id="btnRegister" class="btn">Registrarse</button>
<button id="btnBonus">🎁 Bonus diario</button>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG
const app = initializeApp({
  apiKey: "AIzaSyCOm3jbBL63R_XQjiDBi27WQJCr9lVGakI",
  authDomain: "mi-app-rewards-rd.firebaseapp.com",
  projectId: "mi-app-rewards-rd",
  storageBucket: "mi-app-rewards-rd.firebasestorage.app",
  messagingSenderId: "862164914639",
  appId: "1:862164914639:web:0a2a0ba4beab0dac0cc2ba",
  measurementId: "G-9BMKB6QNV2"
});

const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});
    
const db = getFirestore(app);

// 👁 VER PASSWORD
window.togglePass = function(){
  const input = document.getElementById("loginPassword");
  input.type = input.type === "password" ? "text" : "password";
};

// 📋 REFERIDO
window.pasteRef = function(){
  const ref = localStorage.getItem("referrer_id");
  if(ref){
    document.getElementById("referralCode").value = ref;
    alert("Referido aplicado ✅");
  }
};

// 🔐 LOGIN
window.login = async function(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔥 asegurar que existe en Firestore
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()){
     await setDoc(userRef, {
  email: user.email,
  earnings: 0,
  createdAt: new Date()
});
    }

    alert("Login correcto ✅");
    localStorage.setItem("uid", user.uid)
    window.location.href = "dashboard.html";

  }catch(e){
    console.error(e);
    alert(e.message);
  }
};

// 🆕 REGISTER
window.register = async function(){
  console.log("REGISTER CLICK");

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  if (!email || !password){
    alert("Completa los campos");
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔥 GUARDAR EN FIRESTORE
    await setDoc(doc(db, "users", user.uid), {
      earnings: 0,
      today: 0,
      xp: 0,
      level: 0,
      referredBy: null,
      fraudScore: 0,
      pendingWithdrawal: 0,
      createdAt: new Date()
    });

    console.log("Usuario creado en Firestore ✅");
    alert("Registro exitoso 🚀");

  } catch(err){
    console.error(err);
    alert(err.message);
  }
};
  window.bonus = async function(){
  const user = currentUser;

  if (!user){
    alert("Debes iniciar sesión");
    return;
  }

  try{
    const res = await fetch("/daily-bonus", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user_id: user.uid })
    });

    const text = await res.text();
    alert(text);

  }catch(e){
    console.error(e);
    alert("Error en bonus");
  }
};



// 🎯 REFERIDO URL
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
if(ref){
  localStorage.setItem("referrer_id", ref);
  document.getElementById("referralCode").value = ref;
}
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("btnLogin").addEventListener("click", window.login);
  document.getElementById("btnRegister").addEventListener("click", window.register);
  document.getElementById("btnBonus").addEventListener("click", window.bonus);
});
</script>

</body>
</html>
