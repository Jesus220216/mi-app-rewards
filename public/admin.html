<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="background:#111;color:#fff;font-family:sans-serif">

<h1>📊 Admin Panel</h1>

<button onclick="loadWithdrawals()">Ver Retiros</button>

<pre id="data"></pre>

<script>
function loadWithdrawals(){
  fetch("http://localhost:3000/admin/withdrawals")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("data").textContent =
      JSON.stringify(data,null,2);
  });
}
</script>

</body>
</html>
